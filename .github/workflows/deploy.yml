name: Deploy CloudOps Dashboard

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'                    # Makes future runs faster

      - name: Install dependencies
        run: npm ci                       # Better than npm install for CI

      - name: Run tests
        run: npm test
        # If tests fail, the pipeline stops here (quality gate)

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/html
            git pull origin main
            sudo systemctl restart nginx
            echo "Deployed at $(date)"
